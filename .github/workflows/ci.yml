name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  pytest-course:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Fetch acex (hub capital_pricing dependency)
        run: git clone --depth 1 https://github.com/alexar76/acex.git acex

      - name: Install
        run: |
          python -m pip install --upgrade pip
          git clone --depth 1 https://github.com/alexar76/aimarket-hub.git _deps/aimarket-hub
          git clone --depth 1 https://github.com/alexar76/aimarket-agent.git _deps/aimarket-agent
          python3 scripts/patch_aimarket_hub.py _deps/aimarket-hub
          pip install -e _deps/aimarket-agent -e _deps/aimarket-hub
          pip install -e ".[dev]"

      - name: Test (patterns + i18n + embedded economy)
        run: pytest -q

      - name: Verify course asset build
        run: python3 scripts/build_course_assets.py

      - name: Smoke-run labs in all three languages
        run: |
          for L in en ru es; do
            for lab in lab01_agent_and_tool lab02_topologies lab03_handoff; do
              COURSE_LANG=$L python labs/$lab.py >/dev/null
            done
          done
