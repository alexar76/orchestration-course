name: Bug report
description: Something is broken or incorrect
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or main@abc123
